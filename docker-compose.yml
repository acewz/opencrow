services:
  postgres:
    image: postgres:17-alpine
    ports:
      - "127.0.0.1:5432:5432"
    environment:
      POSTGRES_USER: opencrow
      POSTGRES_PASSWORD: opencrow
      POSTGRES_DB: opencrow
    command: ["postgres", "-c", "max_connections=2000"]
    volumes:
      - pg_data:/var/lib/postgresql/data
    restart: unless-stopped

  qdrant:
    image: qdrant/qdrant:v1.13.2
    ports:
      - "127.0.0.1:6333:6333"
    volumes:
      - qdrant_data:/qdrant/storage
    ulimits:
      nofile:
        soft: 65535
        hard: 65535
    restart: unless-stopped

  questdb:
    image: questdb/questdb:8.2.3
    ports:
      - "127.0.0.1:8812:8812"
      - "127.0.0.1:9000:9000"
      - "127.0.0.1:9009:9009"
    volumes:
      - questdb_data:/var/lib/questdb
    restart: unless-stopped

volumes:
  pg_data:
  qdrant_data:
  questdb_data:
